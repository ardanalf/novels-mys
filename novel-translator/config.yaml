# ===================================================================
# Konfigurasi Novel Translator
# ===================================================================
# API key Gemini bisa diisi di sini ATAU lewat environment variable
# GEMINI_API_KEY (env var lebih diutamakan dan lebih aman).
# Dapatkan API key gratis di: https://aistudio.google.com/apikey
# ===================================================================

# LLM provider yang dipakai. Pilihan: "gemini" | "runeria"
#   - gemini  : Google Gemini (free tier 500 req/hari untuk flash, butuh GEMINI_API_KEY)
#   - runeria : OpenAI-compatible gateway (https://runeria.fun/v1), butuh RUNERIA_API_KEY
#
# Bisa di-override sekali pakai dari CLI: --engine runeria
engine: "gemini"

gemini:
  # Kosongkan kalau pakai env var GEMINI_API_KEY (rekomendasi)
  api_key: ""

  # Model free tier:
  #   - gemini-2.5-flash       : cepat, kualitas bagus, kuota free paling besar (REKOMENDASI)
  #   - gemini-2.5-flash-lite  : paling cepat, kualitas cukup, kuota lebih besar
  #   - gemini-2.5-pro         : kualitas terbaik tapi free tier-nya ketat
  model: "gemini-2.5-flash"

  # Untuk ekstrak glossary lebih baik pakai model yang lebih kuat
  glossary_model: "gemini-2.5-flash"

  # Generation settings
  temperature: 0.3        # rendah = konsisten, tinggi = kreatif
  max_output_tokens: 16384

  # Rate limit handling (Gemini Free Tier: 10 RPM untuk flash, 5 RPM untuk pro)
  requests_per_minute: 8  # diset sedikit di bawah limit biar aman
  max_retries: 5
  retry_base_delay: 5     # detik, exponential backoff

# -------------------------------------------------------------------
# Runeria (OpenAI-compatible gateway). Aktifkan dengan engine: "runeria"
# di atas, atau dari CLI: --engine runeria.
#
# Model yang direkomendasikan untuk terjemahan novel ID (urut dari terbaik):
#   - claude-sonnet-4    : TERBAIK. Nuansa dialog & POV halus, naturally
#                          pilih "aku/kamu" untuk kasual, konsisten antar
#                          chapter panjang. (default)
#   - deepseek-3.2       : Runner-up & TERBAIK untuk source CN/JP karena
#                          dilatih banyak data Asia. Bagus juga sebagai
#                          fallback kalau claude habis.
#   - glm-5              : Solid untuk CN→ID, kualitas mid-tier.
#   - minimax-m2.5       : Decent untuk dialog CN, prosa narasinya kurang
#                          natural dibanding claude/deepseek.
#   - minimax-m2.1       : Versi lama dari m2.5, agak lebih kaku.
#   - qwen3-coder-next   : JANGAN dipakai untuk terjemahan novel — model
#                          ini di-tune untuk kode, output prosa-nya kering.
#
# Endpoint: <base_url>/chat/completions (OpenAI format).
# -------------------------------------------------------------------
runeria:
  # Kosongkan kalau pakai env var RUNERIA_API_KEY (rekomendasi)
  api_key: ""

  base_url: "https://runeria.fun/v1"
  model: "claude-sonnet-4"
  glossary_model: "claude-sonnet-4"

  temperature: 0.3
  max_output_tokens: 16384

  # Rate limit (sesuaikan dengan plan Runeria-mu)
  requests_per_minute: 30
  max_retries: 5
  retry_base_delay: 5
  timeout_seconds: 120

translation:
  target_language: "Indonesian"

  # Style: natural | literal | webnovel
  style: "natural"

  # Chunking: kalau chapter terlalu panjang, dipotong jadi beberapa bagian
  # supaya tidak kena limit token. Disambung lagi otomatis.
  max_chars_per_chunk: 8000      # ~ aman untuk model 1M context
  chunk_overlap_chars: 200       # overlap supaya konteks nyambung

glossary:
  # Mode glossary:
  #   - auto    : ekstrak otomatis dari beberapa chapter awal pakai LLM
  #   - manual  : pakai glossary.json yang sudah kamu isi sendiri
  #   - skip    : tanpa glossary (paling cepat tapi nama bisa inkonsisten)
  mode: "auto"

  # Berapa chapter awal yang dipakai untuk ekstrak glossary
  sample_chapters: 3

output:
  # Pola nama file output. Variabel: {stem} = nama file source tanpa ekstensi
  filename_pattern: "{stem}.txt"

  # Tambahkan header info di file hasil terjemahan?
  add_header: true

filters:
  # Pembersih boilerplate chapter — terutama untuk chapter yang di-scrape
  # dari website translator (sering ada baris kredit, link Patreon/Discord,
  # navigasi prev/next, watermark, dll yang tidak perlu ikut diterjemahkan).
  #
  # Filter dijalankan DUA TAHAP:
  #   1. Pre-translation : source dibersihkan SEBELUM dikirim ke Gemini.
  #                        Hemat token, dan boilerplate tidak ikut diterjemahkan.
  #   2. Post-translation: hasil terjemahan dibersihkan lagi sebagai pengaman
  #                        (kalau ada residu HTML / boilerplate yang lolos).
  #
  # Lihat baris yang AKAN dihapus dengan: --dry-run-filter
  enabled: true
  apply_pre_translation: true
  apply_post_translation: true

  categories:
    credits: true       # "Translated by", "TL:", "Editor:", source attribution
    donate: true        # Patreon, Ko-fi, PayPal, Buy Me a Coffee, Saweria, Trakteer
    social: true        # Discord, Telegram, Twitter/X, Instagram, dll
    navigation: true    # "Prev | Next | Index", garis pemisah polos
    ads: true           # "Like and comment", "Subscribe", "Rate this novel"
    schedule: true      # "Sponsored chapter", "Bonus chapter", release schedule
    tl_notes: false     # Author/Translator notes — DEFAULT KEEP karena sering
                        # ada konteks penting. Set true kalau mau hapus.
    html_residue: true  # &nbsp;, <p>, <br>, dll
    footer: true        # "All rights reserved", "© 2024", "Do not repost"
    whitespace: true    # Normalize multiple blank lines, trailing spaces
    novelupdates: true  # Pola spesifik NovelUpdates (vote on NU, NU reading list)

  # Tambahan regex inline (semua case-insensitive, anchor ke BARIS penuh).
  # Setiap pola harus match seluruh baris untuk menghapusnya.
  custom_patterns: []

  # Tambahan: kamu juga bisa simpan pola per-novel di file
  #   novels/<nama_novel>/filters.txt
  # (1 regex per baris, blank lines & '#' komentar diabaikan).
  # Contoh isi filters.txt:
  #   ^translated\s+by\s+ardanalf\b.*
  #   ^https?://ardanalfino\.my\.id/.*

post_process:
  # Normalisasi otomatis kata ganti formal "Anda/Saya" -> "kamu/aku" SETELAH
  # Gemini menerjemahkan. Aktifkan kalau hasil masih sering pakai "Anda/Saya"
  # di konteks kasual padahal prompt sudah meminta sebaliknya.
  #
  # CARA KERJA:
  #   - Bekerja per-paragraf.
  #   - Mode "safe" (default kalau diaktifkan): paragraf yang mengandung
  #     penanda formal seperti "Yang Mulia", "Paduka", "Tuan ", "Nyonya",
  #     "Jenderal", "Komandan", "Hamba", "Dengan hormat", "Shifu", "Senpai",
  #     dll TIDAK ikut diganti — jadi dialog formal tetap terjaga.
  #   - Mode "aggressive": ganti SEMUA "Anda/Saya" tanpa kecuali. Pakai
  #     hanya kalau kamu yakin tidak ada konteks formal di novelnya.
  normalize_pronouns: false
  normalize_pronouns_strength: "safe"  # safe | aggressive

logging:
  level: "INFO"           # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
